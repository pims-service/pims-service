name: Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-factoryboy djangorestframework-simplejwt django-cors-headers django-environ whitenoise drf-spectacular
      - name: Run Tests
        run: pytest
        env:
          SECRET_KEY: CI_SECRET_KEY
          DATABASE_URL: sqlite:///db.sqlite3
          DEBUG: True

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm run test

  docker-functional-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env from example
        run: cp .env.example .env
        
      - name: Ensure entrypoint is executable (CI)
        run: chmod +x backend/entrypoint.sh
        
      - name: Build and Start Containers
        run: docker compose up -d --build
        
      - name: Wait for Backend Readiness
        timeout-minutes: 5
        run: |
          until [ "$(docker inspect -f {{.State.Health.Status}} psych_backend)" == "healthy" ] || [ "$(docker inspect -f {{.State.Status}} psych_backend)" == "running" ]; do
            echo "Waiting for backend to be healthy/running..."
            sleep 10
            if [ "$(docker inspect -f {{.State.Status}} psych_backend)" == "exited" ]; then
              echo "Backend container has exited unexpectedly!"
              docker compose logs backend
              exit 1
            fi
          done
          echo "Backend is operational."

      - name: Container Status & Logs on Failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend
          docker compose logs celery_worker
