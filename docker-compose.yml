version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: psych_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psych_db}
      POSTGRES_USER: ${POSTGRES_USER:-psych_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psych_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psych_user} -d ${POSTGRES_DB:-psych_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: psych_redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psych_backend
    volumes:
      - ./backend:/app
      - static_volume:/app/static
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: psych_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
